name: 🕹️ Python 3.13 Alpine

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version
        type: string
        required: true

jobs:
  deploy:
    name: Build and Push Docker Image
    uses: albr21/gha-reusable-workflows/.github/workflows/reusable-build-and-push-docker-image-on-ghcr.yml@main
    with:
      name: python-3.13
      tag: ${{ inputs.version }}-alpine
      dockerfile: dockerfiles/python-3.13-alpine/Dockerfile
      context: dockerfiles/python-3.13-alpine
    permissions:
      contents: read
      packages: write
    secrets: inherit
  scan:
    name: Docker Image Vulnerability Scan
    uses: albr21/gha-reusable-workflows/.github/workflows/reusable-docker-image-vulnerability-scan.yml@main
    needs: [ deploy ]
    with:
      name: python-3.13
      tag: ${{ inputs.version }}-alpine
