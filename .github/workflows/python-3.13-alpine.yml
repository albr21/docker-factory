name: 🕹️ Python 3.13 Alpine

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version
        type: string
        required: true
      scan:
        description: Enable vulnerability scan
        type: boolean
        required: true
        default: true

jobs:
  process:
    name: Build, Push and Scan Docker Image
    uses: albr21/gha-reusable-workflows/.github/workflows/reusable-build-push-and-scan-docker-image-on-ghcr.yml@main
    with:
      name: python-3.13
      tag: ${{ inputs.version }}-alpine
      dockerfile: dockerfiles/python-3.13-alpine/Dockerfile
      context: dockerfiles/python-3.13-alpine
      fail-on-vulnerability: ${{ inputs.scan }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
